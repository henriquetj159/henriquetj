# Ensinio WhatsApp Prospector - Squad Configuration
# Version: 5.0.0
# Updated: 2026-03-13
# Architecture: Sheets-First (Google Sheets = source of truth)

name: ensinio-whatsapp-prospector
version: "5.0.0"
entry_agent: prospector-chief

squad:
  name: ensinio-whatsapp-prospector
  display_name: "Ensinio WhatsApp Prospector"
  version: "5.0.0"
  domain: "sales prospecting, whatsapp analysis, lead generation, outreach, icp matching"
  description: |
    Squad especializado em prospectar leads a partir de exports de grupos de WhatsApp.
    Parseia chats, analisa fit com solucoes Ensinio (dual scoring), gera mensagens
    personalizadas via squad delegation, popula Google Sheets (source of truth),
    envia via Evolution API (com confirmacao) e sincroniza com GHL (opcional).

  context: |
    Ensinio e uma plataforma LMS All-in-One com 5 pilares de solucao:
    1. LMS/Area de Membros (23 features)
    2. Gamificacao (7 features)
    3. Agentes de IA (11 features)
    4. Pagamentos Integrados (15 features)
    5. White Label + App + Integracoes (13 features)

    Total: 67 features mapeadas no KB v2.0.

    ARQUITETURA v5.0 (Sheets-First):
    - Google Sheets e a fonte de verdade (Phase 9)
    - Envio via Evolution API com confirmacao (Phase 10)
    - GHL Sync e opcional, NAO envia mensagens (Phase 11)

    Mensagens sao enviadas pelo Antonio, a pedido do Fosc.
    Output vai para Google Sheets ID: 124EQQAkmt9D7-49LbR-Jx64DhxdtCwceUQgqolk5ZFI

  keywords:
    - whatsapp prospecting
    - lead generation
    - outreach messages
    - ensinio
    - lms sales
    - chat parsing
    - google sheets
    - evolution api

orchestrator:
  agent: prospector-chief
  file: agents/prospector-chief.md

layers:
  processing:
    description: "Parsing e processamento tecnico de dados do WhatsApp"
    agents:
      - id: chat-parser
        name: Cipher
        role: WhatsApp Export Parser
        file: agents/chat-parser.md
        model: haiku

  analysis:
    description: "Analise de prospects e matching com solucoes Ensinio (dual scoring)"
    agents:
      - id: prospect-analyst
        name: Minerva
        role: Solution Fit Analyst & Lead Scorer (Dual Scoring)
        file: agents/prospect-analyst.md
        model: sonnet

  outreach:
    description: "Montagem de mensagens personalizadas (delega copy para squads)"
    agents:
      - id: outreach-writer
        role: Outreach Message Assembler (delega copy para squads)
        file: agents/outreach-writer.md
        model: opus

  orchestration:
    agents:
      - id: prospector-chief
        name: Atlas
        role: Pipeline Orchestrator & Lead Qualification Chief
        file: agents/prospector-chief.md
        model: sonnet

workflows:
  full_pipeline:
    file: workflows/full-pipeline.yaml
    description: "Pipeline v5.0 completo (11 fases): Parse -> Sheets -> Evolution API -> GHL"
    phases: 11
  batch_pipeline:
    file: workflows/batch-pipeline.yaml
    description: "Pipeline batch: multiplos grupos, aba por grupo, envio seletivo"
    phases: 5

quality_gates:
  - id: QG-001
    name: "Parse Validation"
    phase: 2
    transition: "Raw ZIP -> Structured Contacts"
    type: blocking
    criteria: "Contatos extraidos com nome, telefone e mensagens agrupadas"
    checklist: checklists/parse-validation-checklist.md

  - id: QG-000.5
    name: "Phone Resolution"
    phase: 4
    transition: "Parsed Contacts -> Contacts with Phones"
    type: interactive
    criteria: "All meaningful contacts have phone or are explicitly skipped"
    checklist: checklists/phone-validation-checklist.md

  - id: QG-002
    name: "Analysis Complete"
    phase: 5
    transition: "Contacts -> Dual-Scored Prospects"
    type: blocking
    criteria: "Todos os contatos analisados com dual score e classificacao 7x3"

  - id: QG-002.5
    name: "Scoring Validation"
    phase: 6
    transition: "Scored Prospects -> Validated Scores"
    type: blocking
    criteria: "Distribuicao de scores validada, classificacao consistente"
    checklist: checklists/scoring-validation-checklist.md

  - id: QG-003
    name: "Message Quality"
    phase: 8
    transition: "Draft -> Approved Message"
    type: blocking
    criteria: "Squad delegation completa, Hopkins audit PASS"
    checklist: checklists/message-quality-checklist.md
    max_rework_iterations: 2

  - id: QG-008
    name: "Sheet Population"
    phase: 9
    transition: "Approved -> Google Sheets (10 columns)"
    type: blocking
    criteria: "Dados inseridos na planilha com 10 colunas, links funcionais, ordenacao correta"

  - id: QG-010
    name: "Send Validation"
    phase: 10
    transition: "Sheets -> Evolution API Send"
    type: interactive
    criteria: "Usuario confirmou, success rate >= 80%, status atualizado no Sheets"

  - id: QG-005
    name: "GHL Sync Validation"
    phase: 11
    transition: "Sheets -> GHL (Contact + Deal)"
    type: optional
    criteria: "Contatos criados, deals no pipeline, colunas I+J preenchidas"
    checklist: checklists/ghl-sync-checklist.md

settings:
  show_greeting: true
  language: pt-BR
  google_sheets_id: "124EQQAkmt9D7-49LbR-Jx64DhxdtCwceUQgqolk5ZFI"
  ensinio_kb_source: "ensinio-mind/data/ensinio-solutions-kb.md"

  # Evolution API (Phase 1a: read groups, Phase 10: send)
  evolution:
    tool_path: "tools/evolution-whatsapp-api"
    env_file: ".env"
    interval_ms: 3000
    error_threshold_percent: 20
    max_retries: 3
    confirm_before_send: true  # ALWAYS — NON-NEGOTIABLE
    preview_count: 3
    instances:
      reader:
        name: "fosc-personal"
        role: "read"
        description: "Numero pessoal nos grupos. Leitura de participantes e mensagens."
      sender:
        name: "ensinio3"
        role: "send"
        description: "Numero comercial Ensinio. Envio de outreach."

  # GoHighLevel Integration (Phase 11 — optional)
  ghl:
    env_file: ".env"
    base_url: "https://services.leadconnectorhq.com"
    api_version: "2021-07-28"
    pipeline_id: "xRqrV2LoT6E8iwLW4Syi"
    default_stage_id: "d3c25373-2b78-43d4-af3a-b4781f15874e"
    default_tags:
      - "Leads Fosc"
    tag_prompt: true
    rate_limit_delay_ms: 600
    batch_size: 50
    send_messages: false  # v5.0: GHL NAO envia mensagens (Evolution API faz isso)

  ensinio_mind_sources:
    icps: "ensinio-mind/data/ensinio-icps.md"
    red_flags: "ensinio-mind/data/ensinio-red-flags.md"
    arguments: "ensinio-mind/data/ensinio-arguments.md"
    sales_playbook: "ensinio-mind/data/ensinio-sales-playbook.md"
    sales_cycle: "ensinio-mind/data/ensinio-sales-cycle.md"
  phone_books_dir: "data/phone-books"
  phone_format: "E.164"
  default_country_code: "+55"
  min_score_threshold: 3
  max_rework_iterations: 2
  batch_size: 50
