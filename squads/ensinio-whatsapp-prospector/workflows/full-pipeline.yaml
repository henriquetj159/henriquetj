# Full Pipeline Workflow v5.1
# Phase 1a (API) or 1b (ZIP) -> Validate -> Load KB -> Resolve Phones (conditional) ->
# Analyze -> Validate Scoring -> Write Outreach -> Validate Batch ->
# Populate Sheets -> Send Evolution API -> GHL Sync
name: full-pipeline
version: "5.1.0"
description: |
  Pipeline completo de prospeccao com dual-source:
  - Phase 1a: Evolution API (instancia reader) — telefones 100% resolvidos
  - Phase 1b: ZIP WhatsApp (fallback com historico completo)

  ARQUITETURA v5.1 (Dual-Instance + Sheets-First):
  - Instancia reader (fosc-personal): leitura de grupos e participantes
  - Instancia sender (ensinio3): envio de outreach
  - Google Sheets e a fonte de verdade (Phase 9)
  - Phase 4 (resolve phones) e pulada no modo API
  - GHL Sync e opcional, NAO envia mensagens (Phase 11)

trigger:
  command: "*full-pipeline {source} {group_name}"
  inputs:
    - name: source
      type: string
      required: true
      description: |
        Data source. Either:
        - Path to WhatsApp ZIP export file (Phase 1b)
        - "api" to fetch via Evolution API (Phase 1a)
    - name: group_name
      type: string
      required: false
      description: "Name of the WhatsApp group (required for ZIP, auto-detected for API)"
    - name: group_jid
      type: string
      required: false
      description: "Group JID for API mode (e.g. 120363001@g.us). If omitted, lists available groups."

# Global pipeline configuration
pipeline_config:
  max_contacts: 500
  min_score_threshold: 3
  max_rework_iterations: 2
  progress_reporting: true
  progress_interval: "10%"

# Retry policy for transient failures
retry_policy:
  max_retries: 2
  backoff: exponential
  initial_delay_seconds: 5
  retryable_errors:
    - "timeout"
    - "rate_limit"
    - "temporary_unavailable"

phases:
  # =========================================================================
  # PHASE 1a: Fetch via Evolution API (conditional — when source == "api")
  # =========================================================================
  - id: phase-1a-api-fetch
    name: "Phase 1a: Fetch Group via Evolution API"
    agent: chat-parser
    model: haiku
    task: tasks/fetch-group-via-api.md
    timeout_minutes: 10
    condition: "source == 'api'"
    inputs:
      - group_jid
    outputs:
      - parsed_contacts
      - group_metadata
    veto_conditions:
      - condition: "Reader instance not connected"
        severity: BLOCKING
        action: HALT
      - condition: "Group JID not found"
        severity: BLOCKING
        action: HALT
    description: |
      Buscar grupo via Evolution API (instancia reader: fosc-personal).
      Participantes vem com telefone 100% resolvido (do JID).
      Output identico ao Phase 1b (ParsedExport format).
      SKIP Phase 4 quando usado (telefones ja resolvidos).
    rollback: "No rollback needed - read-only operation"

  # =========================================================================
  # PHASE 1b: Parse WhatsApp ZIP Export (conditional — when source != "api")
  # =========================================================================
  - id: phase-1b-parse-zip
    name: "Phase 1b: Parse WhatsApp ZIP Export"
    agent: chat-parser
    model: haiku
    task: tasks/parse-chat-export.md
    timeout_minutes: 10
    condition: "source != 'api'"
    inputs:
      - source
      - group_name
    outputs:
      - parsed_contacts
      - group_metadata
    veto_conditions:
      - condition: "ZIP file does not exist"
        severity: BLOCKING
        action: HALT
      - condition: "ZIP file is corrupted"
        severity: BLOCKING
        action: HALT
    description: |
      Extrair do ZIP todos os contatos e mensagens.
      Agrupar por remetente, extrair telefones, filtrar sistema.
    on_failure:
      task: tasks/handle-parse-errors.md
      agent: chat-parser
      model: haiku
    rollback: "No rollback needed - read-only operation"

  # =========================================================================
  # PHASE 2: Validate Parsed Data
  # =========================================================================
  - id: phase-2-validate-parse
    name: "Phase 2: Validate Parsed Data"
    agent: chat-parser
    model: haiku
    task: tasks/validate-parsed-data.md
    timeout_minutes: 5
    depends_on:
      - phase-1a-api-fetch
      - phase-1b-parse-zip
    inputs:
      - parsed_contacts
      - group_metadata
    outputs:
      - validation_report
      - quality_metrics
    quality_gate: QG-001
    veto_conditions:
      - condition: "0 contacts extracted"
        severity: BLOCKING
        action: HALT
      - condition: "< 10 non-system messages"
        severity: BLOCKING
        action: HALT
      - condition: "Phone coverage < 50%"
        severity: WARNING
        action: LOG_AND_CONTINUE
    description: |
      Validar integridade dos dados parseados.
      Checklist de qualidade pos-extracao.
      Se FAIL, acionar handle-parse-errors.
    on_failure:
      task: tasks/handle-parse-errors.md
      agent: chat-parser
      model: haiku
    rollback: "Re-parse with different encoding if format issue"

  # =========================================================================
  # PHASE 3: Load Ensinio Knowledge Base (paralelo com Phase 1)
  # =========================================================================
  - id: phase-3-load-kb
    name: "Phase 3: Load Ensinio Knowledge Base"
    agent: prospector-chief
    model: sonnet
    task: tasks/load-ensinio-kb.md
    timeout_minutes: 5
    parallel_with: phase-1-parse
    outputs:
      - ensinio_kb
    veto_conditions:
      - condition: "KB source file not found"
        severity: BLOCKING
        action: HALT
      - condition: "KB file is empty"
        severity: BLOCKING
        action: HALT
      - condition: "Not all 5 pillars detected"
        severity: WARNING
        action: LOG_AND_CONTINUE
    description: |
      Carregar e estruturar os 5 pilares de solucao Ensinio (67 features).
      Source: ensinio-mind/data/ensinio-solutions-kb.md
      Pode rodar em paralelo com o parsing.
    rollback: "No rollback needed - read-only operation"

  # =========================================================================
  # PHASE 4: Resolve Phone Numbers (Interactive)
  # =========================================================================
  - id: phase-4-resolve-phones
    name: "Phase 4: Resolve Phone Numbers (Interactive)"
    agent: prospector-chief
    model: sonnet
    task: tasks/resolve-phone-numbers.md
    timeout_minutes: 60
    skip_when: "source == 'api'"
    skip_reason: "API mode resolves phones from JIDs automatically (100% coverage)"
    depends_on:
      - phase-2-validate-parse
    inputs:
      - parsed_contacts
      - group_name
    outputs:
      - contacts_with_phones
      - phone_book_path
      - phone_resolution_summary
    quality_gate: QG-000.5
    veto_conditions:
      - condition: "validate-parsed-data not completed"
        severity: BLOCKING
        action: HALT
      - condition: "All contacts already have phones"
        severity: INFO
        action: SKIP_PHASE
      - condition: "All contacts skipped by user"
        severity: WARNING
        action: "LOG_AND_CONTINUE (pipeline produces empty results)"
    description: |
      Fase interativa: apresentar contatos sem telefone ao usuario.
      Resolver numeros no formato E.164 (+55XXXXXXXXXXX).
      Salvar phone-book per group em data/phone-books/{group-slug}.json.
      Reutilizar phone-book se grupo ja foi processado antes.
    rollback: "No rollback needed - phone-book is additive"

  # =========================================================================
  # PHASE 5: Analyze & Score Prospects (Dual Scoring)
  # =========================================================================
  - id: phase-5-analyze
    name: "Phase 5: Analyze & Score Prospects (Dual Scoring)"
    agent: prospect-analyst
    model: sonnet
    task: tasks/analyze-prospects.md
    timeout_minutes: 30
    depends_on:
      - phase-4-resolve-phones
      - phase-3-load-kb
    inputs:
      - contacts_with_phones
      - ensinio_kb
    outputs:
      - scored_prospects
      - disqualified_prospects
    quality_gate: QG-002
    veto_conditions:
      - condition: "Contacts with phones not available"
        severity: BLOCKING
        action: HALT
      - condition: "KB not loaded"
        severity: BLOCKING
        action: HALT
    description: |
      Red flag pre-screen (BLOQUEADOR = client_score 0).
      EIXO 1: Client Score (0-10) — potencial como cliente direto.
      EIXO 2: Partner Score (0-10) — potencial como multiplicador.
      Matriz 7x3 de classificacao.
      Filtrar: client_score >= 3 OR partner_score >= 4.
    rollback: "Re-analyze with adjusted scoring criteria"

  # =========================================================================
  # PHASE 6: Validate Scoring Quality
  # =========================================================================
  - id: phase-6-validate-scoring
    name: "Phase 6: Validate Scoring Quality"
    agent: prospector-chief
    model: sonnet
    task: checklists/scoring-validation-checklist.md
    timeout_minutes: 5
    depends_on:
      - phase-5-analyze
    inputs:
      - scored_prospects
    outputs:
      - scoring_validation_report
    quality_gate: QG-002.5
    veto_conditions:
      - condition: "Score distribution is uniform (all same score)"
        severity: WARNING
        action: LOG_AND_CONTINUE
      - condition: "No prospects with score >= 3"
        severity: BLOCKING
        action: HALT
    description: |
      Validar qualidade do scoring.
      Verificar distribuicao de scores.
      Sanity check de classificacao dual (client + partner).

  # =========================================================================
  # PHASE 7: Write Personalized Messages (Squad Delegation)
  # =========================================================================
  - id: phase-7-write
    name: "Phase 7: Write Personalized Messages (Squad Delegation)"
    agent: outreach-writer
    model: opus
    task: tasks/write-outreach.md
    timeout_minutes: 45
    depends_on:
      - phase-6-validate-scoring
    inputs:
      - scored_prospects
    outputs:
      - messages_with_links
    veto_conditions:
      - condition: "Prospect analysis not available"
        severity: BLOCKING
        action: HALT
      - condition: "Message rules not loaded"
        severity: BLOCKING
        action: HALT
    description: |
      outreach-writer NAO escreve copy. Ele monta a mensagem consultando:
      1. @eugene-schwartz (awareness level)
      2. @leandro-ladeira (Big Idea por cluster)
      3. @copy-maestro (clone selection)
      4. [clone executor] (draft da mensagem)
      5. @claude-hopkins (audit final)
      Depois monta mensagem final com contexto Ensinio + gera WhatsApp links.
    rollback: "Rewrite specific messages that failed validation"

  # =========================================================================
  # PHASE 8: Validate Outreach Batch
  # =========================================================================
  - id: phase-8-validate-outreach
    name: "Phase 8: Validate Outreach Batch"
    agent: prospector-chief
    model: sonnet
    task: tasks/validate-outreach-batch.md
    timeout_minutes: 15
    depends_on:
      - phase-7-write
    inputs:
      - messages_with_links
    outputs:
      - approved_messages
      - rejected_messages
    quality_gate: QG-003
    veto_conditions:
      - condition: "No messages in batch"
        severity: BLOCKING
        action: HALT
      - condition: "Quality checklist not loaded"
        severity: BLOCKING
        action: HALT
      - condition: "> 30% messages rejected"
        severity: WARNING
        action: REWORK
    description: |
      Validar humanizacao e qualidade de cada mensagem.
      Validar links WhatsApp.
      Reenviar rejeitadas para rewrite se necessario.
    on_failure:
      rework:
        task: tasks/write-outreach.md
        agent: outreach-writer
        max_iterations: 2
        input: rejected_messages
    rollback: "Return to phase-7-write with rejection feedback"

  # =========================================================================
  # PHASE 9: Populate Google Sheets (BLOQUEADOR — Source of Truth)
  # =========================================================================
  - id: phase-9-populate-sheet
    name: "Phase 9: Populate Google Sheets (Source of Truth)"
    agent: prospector-chief
    model: sonnet
    task: tasks/populate-sheet-v5.md
    timeout_minutes: 10
    depends_on:
      - phase-8-validate-outreach
    inputs:
      - approved_messages
      - group_name
    outputs:
      - sheet_url
      - summary_stats
    quality_gate: QG-008
    veto_conditions:
      - condition: "No approved messages to populate"
        severity: BLOCKING
        action: HALT
      - condition: "Google Sheets access not available"
        severity: BLOCKING
        action: HALT
      - condition: "Sheet already has data for this group"
        severity: WARNING
        action: ASK_USER
    description: |
      BLOQUEADOR: Google Sheets e a fonte de verdade em v5.0.
      10 colunas: Nome, Telefone, Grupo, Projeto, Explicacao, Mensagem,
      Link WhatsApp, Status Envio, Link GHL, GHL Contact ID.
      Ordenar por temperature DESC.
      Coluna H default: "Nao enviado"
    rollback: "Clear sheet rows and re-populate"

  # =========================================================================
  # PHASE 10: Send via Evolution API (INTERATIVO — sempre pergunta)
  # =========================================================================
  - id: phase-10-send-evolution
    name: "Phase 10: Send via Evolution API (Interactive)"
    agent: prospector-chief
    model: sonnet
    task: tasks/send-via-evolution-api.md
    timeout_minutes: 60
    depends_on:
      - phase-9-populate-sheet
    inputs:
      - approved_messages
      - group_name
    outputs:
      - send_report
      - updated_sheet_status
    quality_gate: QG-010
    interactive: true
    veto_conditions:
      - condition: "Evolution API not configured (.env)"
        severity: BLOCKING
        action: HALT
      - condition: "Evolution instance not connected"
        severity: BLOCKING
        action: HALT
      - condition: "User did not confirm send"
        severity: BLOCKING
        action: HALT
      - condition: "Error rate > 20%"
        severity: WARNING
        action: PAUSE_AND_ASK
    description: |
      INTERATIVO: NUNCA envia sem confirmacao explicita do usuario.

      Fluxo:
      1. Ler Sheets, filtrar contatos com status "Nao enviado"
      2. PERGUNTAR: "Deseja enviar X mensagens do grupo {nome}? [S/N]"
      3. Mostrar preview de 2-3 mensagens antes do envio
      4. Se confirmado: batch send com pacing (intervalMs >= 3000)
      5. Atualizar Coluna H: "Nao enviado" -> "Enviado" ou "Erro"
      6. Relatorio: enviados / erros / pendentes

      Guardrails:
      - NUNCA envia sem confirmacao (BLOQUEADOR)
      - Pacing minimo 3s entre mensagens
      - Se erro > 20%, PAUSA e pergunta ao usuario
      - Mostra preview antes de confirmar
    rollback: "Messages already sent cannot be unsent - document failures"

  # =========================================================================
  # PHASE 11: Sync to GHL (OPCIONAL — sem envio de mensagens)
  # =========================================================================
  - id: phase-11-ghl-sync
    name: "Phase 11: Sync to GHL (Optional)"
    agent: prospector-chief
    model: sonnet
    task: tasks/sync-to-ghl-v5.md
    timeout_minutes: 30
    depends_on:
      - phase-9-populate-sheet
    optional: true
    inputs:
      - approved_messages
      - group_name
    outputs:
      - ghl_contacts_created
      - ghl_deals_created
      - ghl_sync_report
    quality_gate: QG-005
    veto_conditions:
      - condition: "GHL API token not configured"
        severity: BLOCKING
        action: HALT
      - condition: "GHL pipeline not found"
        severity: BLOCKING
        action: HALT
      - condition: "Rate limit exceeded"
        severity: WARNING
        action: "WAIT_AND_RETRY"
    description: |
      OPCIONAL: NAO envia mensagens. Apenas sincroniza dados com GHL.

      Para cada prospect:
      1. Perguntar tags ao usuario (default: "Leads Fosc")
      2. POST /contacts/ -> criar/buscar contato no GHL (com tags)
      3. POST /deals/ (fallback /opportunities/) -> criar deal
      4. Atualizar Colunas I+J no Sheets (Link GHL, Contact ID)

      CRITICO: Esta fase NAO envia nenhuma mensagem.
      O envio e feito pela Phase 10 (Evolution API) ou manualmente.
    rollback: "Deals can be manually deleted in GHL if needed"

# =========================================================================
# COMPLETION
# =========================================================================
completion:
  summary: |
    Pipeline v5.0 completo! Resultados:
    - Google Sheets (source of truth): populado com todos os prospects
    - Evolution API: mensagens enviadas (se confirmado pelo usuario)
    - GHL: contatos e deals sincronizados (se Phase 11 executada)
    - Planilha: https://docs.google.com/spreadsheets/d/124EQQAkmt9D7-49LbR-Jx64DhxdtCwceUQgqolk5ZFI
  report:
    - total_contacts_parsed
    - total_phones_resolved
    - total_qualified_prospects
    - prospects_by_classification
    - prospects_by_pillar
    - temperature_distribution
    - messages_approved_vs_rejected
    - batch_quality_score
    - quality_gates_summary
    - evolution_api_sent
    - evolution_api_errors
    - ghl_contacts_created
    - ghl_deals_created
    - ghl_tags_applied
