# ============================================
# DEPRECATED — Legacy Compatibility Layer
# ============================================
# This monolithic config is DEPRECATED as of W3.11.
# The layered config system is now active:
#   L1: .aios-core/framework-config.yaml (framework defaults)
#   L2: .aios-core/project-config.yaml   (project settings)
#   L4: .aios-core/local-config.yaml     (machine-specific, gitignored)
#   L5: ~/.aios/user-config.yaml          (user preferences)
#
# This file is kept ONLY for backward compatibility with direct consumers
# that have not been migrated to use resolveConfig() yet.
# New code MUST use: require('.aios-core/core/config/config-resolver').resolveConfig()
#
# Backup: .aios-core/core-config.backup.yaml
# Migration date: 2026-02-26
# ============================================
markdownExploder: true
project:
  type: greenfield
  installedAt: '2026-02-26T02:16:18.569Z'
  version: 2.1.0
user_profile: advanced
ide:
  selected:
    - claude-code
    - codex
  configs:
    vscode: false
    codex: true
    gemini: false
    cursor: false
    github-copilot: false
    antigravity: false
    zed: false
    claude-desktop: false
    claude-code: true
mcp:
  enabled: false
  configLocation: .claude/mcp.json
  servers: []
qa:
  qaLocation: docs/qa
prd:
  prdFile: docs/prd.md
  prdVersion: v4
  prdSharded: true
  prdShardedLocation: docs/prd
  epicFilePattern: epic-{n}*.md
architecture:
  architectureFile: docs/architecture.md
  architectureVersion: v4
  architectureSharded: true
  architectureShardedLocation: docs/architecture
customTechnicalDocuments: null
devLoadAlwaysFiles:
  - docs/framework/coding-standards.md
  - docs/framework/tech-stack.md
  - docs/framework/source-tree.md
devLoadAlwaysFilesFallback:
  - docs/architecture/padroes-de-codigo.md
  - docs/architecture/pilha-tecnologica.md
  - docs/architecture/arvore-de-origem.md
devDebugLog: .ai/debug-log.md
devStoryLocation: docs/stories
slashPrefix: AIOS
frameworkDocsLocation: docs/framework
projectDocsLocation: docs/architecture/project-decisions
lazyLoading:
  enabled: true
  heavySections:
    - pvMindContext
    - squads
    - registry
git:
  showConfigWarning: true
  cacheTimeSeconds: 300
decisionLogging:
  enabled: true
  async: true
  location: .ai/
  indexFile: decision-logs-index.md
  format: adr
  performance:
    maxOverhead: 50
toolsLocation: .aios-core/tools
scriptsLocation: .aios-core/scripts
dataLocation: .aios-core/data
elicitationLocation: .aios-core/core/elicitation
squadsLocation: squads
mindsLocation: outputs/minds
projectStatus:
  enabled: true
  autoLoadOnAgentActivation: true
  showInGreeting: true
  cacheTimeSeconds: 60
  components:
    gitBranch: true
    gitStatus: true
    recentWork: true
    currentEpic: true
    currentStory: true
  statusFile: .aios/project-status.yaml
  maxModifiedFiles: 5
  maxRecentCommits: 2
boundary:
  frameworkProtection: true
  protected:
    - .aios-core/core/**
    - .aios-core/development/tasks/**
    - .aios-core/development/templates/**
    - .aios-core/development/checklists/**
    - .aios-core/development/workflows/**
    - .aios-core/infrastructure/**
    - .aios-core/constitution.md
    - bin/aios.js
    - bin/aios-init.js
  exceptions:
    - .aios-core/data/**
    - .aios-core/development/agents/*/MEMORY.md
    - .aios-core/core/config/schemas/**
    - .aios-core/core/config/template-overrides.js
# JARVIS - Intelligent Orchestration Layer
jarvis:
  enabled: true                    # Enable/disable JARVIS CLI entry point
  autonomy: supervised             # supervised | assisted | autonomous
  personality: true                # true = MCU JARVIS tone; false = plain responses
  version: "1.0.0"                 # JARVIS module version
  greeting:
    enabled: true                  # Show greeting on startup
    address: "sir"                 # Configurable honorific in greetings
agentIdentity:
  greeting:
    preference: auto
    contextDetection: true
    sessionDetection: hybrid
    workflowDetection: hardcoded
    performance:
      gitCheckCache: true
      gitCheckTTL: 300
